<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钢材市场分析平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-sidebar: #1e1b4b;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --radius: 0.75rem;
            --radius-lg: 1rem;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            box-shadow: var(--shadow-md);
        }

        .logo-text h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text span {
            font-size: 0.75rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-icon.blue { background: #dbeafe; color: #2563eb; }
        .stat-icon.green { background: #d1fae5; color: #059669; }
        .stat-icon.purple { background: #e9d5ff; color: #7c3aed; }
        .stat-icon.orange { background: #ffedd5; color: #ea580c; }

        .stat-content h3 {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(to right, #fafbfc, #f8fafc);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-header h3::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            border-radius: 2px;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Forms & Inputs */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.875rem;
            transition: var(--transition);
            width: 100%;
            background: var(--bg-card);
            color: var(--text-main);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .form-control::placeholder {
            color: var(--text-light);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -2px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            border-color: var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: var(--border-light);
            border-color: var(--text-light);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
            border-color: #fca5a5;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #fecaca, #fca5a5);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -2px rgba(16, 185, 129, 0.4);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
        }

        .btn-icon {
            padding: 0.5rem;
            border-radius: var(--radius);
        }

        /* File Upload */
        .file-upload-wrapper {
            position: relative;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .file-input-label:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f0f0ff;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        thead {
            background: linear-gradient(to right, #f8fafc, #f1f5f9);
        }

        th {
            font-weight: 600;
            text-align: left;
            padding: 1rem 1.25rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.8125rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: var(--transition);
        }

        th:hover {
            background: #e2e8f0;
            color: var(--primary);
        }

        th.sorted-asc::after { content: ' ↑'; color: var(--primary); }
        th.sorted-desc::after { content: ' ↓'; color: var(--primary); }

        td {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-main);
            vertical-align: middle;
        }

        tr { transition: var(--transition); }
        tr:hover td { background: #f8fafc; }
        tr:last-child td { border-bottom: none; }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.025em;
        }

        .badge-blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #1e40af; }
        .badge-green { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; }
        .badge-purple { background: linear-gradient(135deg, #e9d5ff, #d8b4fe); color: #5b21b6; }
        .badge-orange { background: linear-gradient(135deg, #ffedd5, #fed7aa); color: #9a3412; }

        /* Price styling */
        .price {
            font-family: 'SF Mono', 'Consolas', monospace;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .price-main { color: #d97706; }
        .price-supply { color: #059669; }
        .price-diff { color: #dc2626; }

        /* Actions */
        .action-btns {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 1280px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--text-main);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            max-width: 400px;
        }

        .toast.show { transform: translateY(0); }
        .toast.error {
            background: linear-gradient(135deg, var(--danger), #dc2626);
        }
        .toast.success {
            background: linear-gradient(135deg, var(--success), #059669);
        }

        .toast-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-light);
            gap: 0.75rem;
        }

        .loading::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-light);
            background: linear-gradient(to right, #fafbfc, #f8fafc);
        }

        .pagination-info {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .pagination-btns {
            display: flex;
            gap: 0.5rem;
        }

        /* Form Section */
        .form-section {
            margin-bottom: 1.5rem;
        }

        .form-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        /* Collapsible */
        details {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 1rem;
        }

        details summary {
            padding: 1rem 1.25rem;
            background: var(--border-light);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.875rem;
            transition: var(--transition);
        }

        details summary:hover {
            background: var(--border);
            color: var(--text-main);
        }

        details[open] summary {
            border-bottom: 1px solid var(--border);
        }

        details .details-content {
            padding: 1.25rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .header-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            main {
                padding: 1rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }

        .card { animation: fadeIn 0.4s ease forwards; }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">
                <h1>钢材市场分析平台</h1>
                <span>Steel Market Analytics</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="file-upload-wrapper">
                <div class="file-input-wrapper">
                    <span class="file-input-label">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        选择文件
                    </span>
                    <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" />
                </div>
                <button class="btn btn-primary" id="uploadBtn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    导入数据
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-content">
                        <h3>数据总量</h3>
                        <div class="stat-value" id="totalCount">--</div>
                    </div>
                    <div class="stat-icon blue">📊</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-content">
                        <h3>平均价格</h3>
                        <div class="stat-value" id="avgPrice">--</div>
                    </div>
                    <div class="stat-icon green">💰</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-content">
                        <h3>品类数量</h3>
                        <div class="stat-value" id="categoryCount">--</div>
                    </div>
                    <div class="stat-icon purple">📦</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-content">
                        <h3>品牌数量</h3>
                        <div class="stat-value" id="brandCount">--</div>
                    </div>
                    <div class="stat-icon orange">🏭</div>
                </div>
            </div>
        </div>

        <!-- Search Filter -->
        <section class="card">
            <div class="card-header">
                <h3>筛选查询</h3>
                <div style="display: flex; gap: 0.75rem;">
                    <button class="btn btn-secondary btn-sm" id="resetBtn">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        重置
                    </button>
                    <button class="btn btn-success btn-sm" id="exportBtn">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        导出
                    </button>
                    <button class="btn btn-primary btn-sm" id="searchBtn">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        查询
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>ID</label>
                        <input id="id" class="form-control" placeholder="输入 ID">
                    </div>
                    <div class="form-group">
                        <label>类型</label>
                        <input id="category" class="form-control" placeholder="如: 型材">
                    </div>
                    <div class="form-group">
                        <label>品名</label>
                        <input id="productName" class="form-control" placeholder="如: 工字钢">
                    </div>
                    <div class="form-group">
                        <label>型号</label>
                        <input id="model" class="form-control" placeholder="如: 10">
                    </div>
                    <div class="form-group">
                        <label>规格1</label>
                        <input id="spec1" class="form-control" placeholder="如: 8-10">
                    </div>
                    <div class="form-group">
                        <label>规格4</label>
                        <input id="spec4" class="form-control" placeholder="输入规格4">
                    </div>
                    <div class="form-group">
                        <label>品牌/厂家</label>
                        <input id="brand" class="form-control" placeholder="如: 百信">
                    </div>
                    <div class="form-group">
                        <label>材质</label>
                        <input id="material" class="form-control" placeholder="如: 普通">
                    </div>
                    <div class="form-group">
                        <label>执行标准</label>
                        <input id="standard" class="form-control" placeholder="如: GB/T 6728-2017">
                    </div>

<div id="toast" class="toast">
    <span class="toast-icon"></span>
    <span class="toast-message"></span>
</div>

<script>
    const apiBase = '/api/steel-items';
    let state = { page: 0, size: 10, sortBy: 'updatedAt', direction: 'DESC', totalPages: 0 };

    // --- UI Helpers ---
    const showToast = (msg, type = 'success') => {
        const t = document.getElementById('toast');
        const icon = t.querySelector('.toast-icon');
        const message = t.querySelector('.toast-message');

        icon.textContent = type === 'success' ? '✓' : '✕';
        message.textContent = msg;
        t.className = `toast show ${type}`;
        setTimeout(() => t.className = 'toast', 3000);
    };

    // --- Stats Loading ---
    async function loadStats() {
        try {
            const res = await fetch(`${apiBase}?page=0&size=1`);
            const data = await res.json();

            document.getElementById('totalCount').textContent = data.totalElements || 0;

            // Load all data for stats
            const allRes = await fetch(`${apiBase}?page=0&size=1000`);
            const allData = await allRes.json();
            const items = allData.content || [];

            if (items.length > 0) {
                // Calculate average price
                const prices = items.filter(i => i.price1).map(i => i.price1);
                const avgPrice = prices.length > 0 ? (prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(0) : '--';
                document.getElementById('avgPrice').textContent = avgPrice !== '--' ? `¥${avgPrice}` : '--';

                // Count categories
                const categories = new Set(items.map(i => i.category).filter(Boolean));
                document.getElementById('categoryCount').textContent = categories.size;

                // Count brands
                const brands = new Set(items.map(i => i.brand).filter(Boolean));
                document.getElementById('brandCount').textContent = brands.size;
            }
        } catch (e) {
            console.error('Failed to load stats:', e);
        }
    }

    // --- Data Loading ---
    const tbody = document.querySelector('#dataTable tbody');
    const pageInfo = document.querySelector('#pageInfo');

    async function loadData() {
        const params = new URLSearchParams({
            page: state.page,
            size: state.size,
            sortBy: state.sortBy,
            direction: state.direction,
            ...collectFilters()
        });

        try {
            tbody.innerHTML = '<tr><td colspan="14"><div class="loading">正在加载数据...</div></td></tr>';
            const res = await fetch(`${apiBase}?${params.toString()}`);
            if (!res.ok) throw new Error('加载失败');
            const pageData = await res.json();

            state.totalPages = pageData.totalPages;
            renderRows(pageData.content);
            pageInfo.textContent = `第 ${state.page + 1} / ${state.totalPages || 1} 页 (共 ${pageData.totalElements} 条)`;

            // Update button states
            document.getElementById('prevBtn').disabled = state.page === 0;
            document.getElementById('nextBtn').disabled = state.page + 1 >= state.totalPages;
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="14"><div class="empty-state"><div class="empty-state-icon">⚠️</div><p>${e.message}</p></div></td></tr>`;
        }
    }

    function renderRows(items) {
        tbody.innerHTML = '';
        if (!items || items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="14"><div class="empty-state"><div class="empty-state-icon">📭</div><p>暂无数据</p><small style="color: var(--text-light);">尝试调整筛选条件或导入新数据</small></div></td></tr>';
            return;
        }

        items.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.className = 'fade-in';
            tr.style.animationDelay = `${index * 0.05}s`;

            const region = [item.province, item.city, item.district].filter(Boolean).join(' / ') || '-';
            const visibleBadge = item.visible ?
                '<span class="badge badge-green">显示</span>' :
                '<span class="badge badge-orange">隐藏</span>';

            tr.innerHTML = `
                <td><span class="badge badge-blue">${item.category || '-'}</span></td>
                <td style="font-weight: 600;">${item.productName || '-'}</td>
                <td>${item.model || '-'}</td>
                <td>${item.spec1 || '-'}</td>
                <td>${item.unit || '-'}</td>
                <td>${item.material || '-'}</td>
                <td>${item.brand || '-'}</td>
                <td style="font-size: 0.8125rem; color: var(--text-secondary);">${region}</td>
                <td class="price price-main">${item.price1 != null ? '¥' + item.price1 : '-'}</td>
                <td class="price price-supply">${item.supplyPrice != null ? '¥' + item.supplyPrice : '-'}</td>
                <td class="price price-diff">${item.diffPrice != null ? '¥' + item.diffPrice : '-'}</td>
                <td>${visibleBadge}</td>
                <td style="font-size: 0.8125rem; color: var(--text-secondary);">${item.updatedAt ? new Date(item.updatedAt).toLocaleDateString('zh-CN') : '-'}</td>
                <td>
                    <div class="action-btns">
                        <button class="btn btn-secondary btn-sm" data-action="edit" title="编辑">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button class="btn btn-danger btn-sm" data-action="delete" title="删除">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </td>`;

            tr.querySelector('[data-action="edit"]').addEventListener('click', () => {
                fillForm(item);
                document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
            });

            tr.querySelector('[data-action="delete"]').addEventListener('click', async () => {
                if (confirm('确定要删除这条数据吗？此操作不可恢复。')) {
                    try {
                        await fetch(`${apiBase}/${item.id}`, { method: 'DELETE' });
                        showToast('删除成功');
                        loadData();
                        loadStats();
                    } catch (e) {
                        showToast('删除失败', 'error');
                    }
                }
            });
            tbody.appendChild(tr);
        });
    }

    // --- Form Handling ---
    function collectFilters() {
        return {
            id: document.getElementById('id').value,
            category: document.getElementById('category').value,
            productName: document.getElementById('productName').value,
            model: document.getElementById('model').value,
            spec1: document.getElementById('spec1').value,
            spec4: document.getElementById('spec4').value,
            brand: document.getElementById('brand').value,
            material: document.getElementById('material').value,
            standard: document.getElementById('standard').value,
            province: document.getElementById('province').value,
            city: document.getElementById('city').value,
            district: document.getElementById('district').value,
            calcMode: document.getElementById('calcMode').value,
            origin: '',
            minPrice1: document.getElementById('minPrice1').value,
            maxPrice1: document.getElementById('maxPrice1').value,
            minSupplyPrice: document.getElementById('minSupplyPrice').value,
            maxSupplyPrice: document.getElementById('maxSupplyPrice').value,
            visible: document.getElementById('visible').value
        };
    }

    function collectForm() {
        const val = id => document.getElementById(id).value || null;
        const num = id => { const v = document.getElementById(id).value; return v === '' ? null : Number(v); };
        const bool = id => { const v = document.getElementById(id).value; return v === '' ? null : v === 'true'; };
        return {
            category: val('f_category'),
            productName: val('f_productName'),
            model: val('f_model'),
            brand: val('f_brand'),
            material: val('f_material'),
            standard: val('f_standard'),
            province: val('f_province'),
            city: val('f_city'),
            district: val('f_district'),
            spec1: val('f_spec1'),
            spec2: val('f_spec2'),
            spec3: val('f_spec3'),
            spec4: val('f_spec4'),
            spec5: val('f_spec5'),
            price1: num('f_price1'),
            price2: num('f_price2'),
            price3: num('f_price3'),
            price4: num('f_price4'),
            price5: num('f_price5'),
            supplyPrice: num('f_supplyPrice'),
            diffPrice: num('f_diffPrice'),
            inventory: num('f_inventory'),
            unit: val('f_unit'),
            calcMode: val('f_calcMode'),
            remark: val('f_remark'),
            visible: bool('f_visible'),
            weightPerMeter: num('f_weightPerMeter'),
            lengthMm: num('f_lengthMm'),
            origin: val('f_origin'),
            contact: val('f_contact')
        };
    }

    function fillForm(item) {
        document.getElementById('itemId').value = item.id || '';
        document.getElementById('f_category').value = item.category || '';
        document.getElementById('f_productName').value = item.productName || '';
        document.getElementById('f_model').value = item.model || '';
        document.getElementById('f_brand').value = item.brand || '';
        document.getElementById('f_material').value = item.material || '';
        document.getElementById('f_standard').value = item.standard || '';
        document.getElementById('f_province').value = item.province || '';
        document.getElementById('f_city').value = item.city || '';
        document.getElementById('f_district').value = item.district || '';
        document.getElementById('f_price1').value = item.price1 ?? '';
        document.getElementById('f_price2').value = item.price2 ?? '';
        document.getElementById('f_price3').value = item.price3 ?? '';
        document.getElementById('f_price4').value = item.price4 ?? '';
        document.getElementById('f_price5').value = item.price5 ?? '';
        document.getElementById('f_supplyPrice').value = item.supplyPrice ?? '';
        document.getElementById('f_diffPrice').value = item.diffPrice ?? '';
        document.getElementById('f_inventory').value = item.inventory ?? '';
        document.getElementById('f_unit').value = item.unit || '';
        document.getElementById('f_calcMode').value = item.calcMode || '';
        document.getElementById('f_remark').value = item.remark || '';
        document.getElementById('f_visible').value = item.visible === null || item.visible === undefined ? '' : String(item.visible);
        document.getElementById('f_weightPerMeter').value = item.weightPerMeter ?? '';
        document.getElementById('f_lengthMm').value = item.lengthMm ?? '';
        document.getElementById('f_origin').value = item.origin || '';
        document.getElementById('f_contact').value = item.contact || '';
        document.getElementById('f_spec1').value = item.spec1 || '';
        document.getElementById('f_spec2').value = item.spec2 || '';
        document.getElementById('f_spec3').value = item.spec3 || '';
        document.getElementById('f_spec4').value = item.spec4 || '';
        document.getElementById('f_spec5').value = item.spec5 || '';
    }

    function clearForm() {
        document.getElementById('editForm').reset();
        document.getElementById('itemId').value = '';
    }

    // --- Event Listeners ---
    document.getElementById('searchBtn').addEventListener('click', () => {
        state.page = 0;
        state.sortBy = 'price1';
        state.direction = 'ASC';
        loadData();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        document.querySelectorAll('.card-body input').forEach(i => i.value = '');
        document.querySelectorAll('.card-body select').forEach(s => s.value = '');
        state.page = 0;
        state.sortBy = 'updatedAt';
        state.direction = 'DESC';
        loadData();
    });

    document.getElementById('exportBtn').addEventListener('click', async () => {
        const btn = document.getElementById('exportBtn');
        const original = btn.innerHTML;
        btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 导出中...';
        btn.disabled = true;
        const params = new URLSearchParams({
            sortBy: state.sortBy,
            direction: state.direction,
            ...collectFilters()
        });
        try {
            const res = await fetch(`${apiBase}/export?${params.toString()}`);
            if (!res.ok) throw new Error('导出失败');
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'steel_items.xlsx';
            a.click();
            window.URL.revokeObjectURL(url);
            showToast('导出完成');
        } catch (e) {
            showToast(e.message || '导出失败', 'error');
        } finally {
            btn.innerHTML = original;
            btn.disabled = false;
        }
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
        if (state.page > 0) {
            state.page--;
            loadData();
        }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
        if (state.page + 1 < state.totalPages) {
            state.page++;
            loadData();
        }
    });

    document.getElementById('size').addEventListener('change', (e) => {
        state.size = Number(e.target.value);
        state.page = 0;
        loadData();
    });

    document.querySelectorAll('th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
            const field = th.dataset.sort;
            state.direction = state.sortBy === field && state.direction === 'DESC' ? 'ASC' : 'DESC';
            state.sortBy = field;
            state.page = 0;

            // Update sort indicators
            document.querySelectorAll('th').forEach(t => {
                t.classList.remove('sorted-asc', 'sorted-desc');
            });
            th.classList.add(state.direction === 'ASC' ? 'sorted-asc' : 'sorted-desc');

            loadData();
        });
    });

    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('itemId').value;
        const payload = collectForm();
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${apiBase}/${id}` : apiBase;

        const submitBtn = document.querySelector('#editForm button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 保存中...';
        submitBtn.disabled = true;

        try {
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!res.ok) throw new Error('保存失败');
            showToast(id ? '更新成功' : '创建成功');
            clearForm();
            loadData();
            loadStats();
        } catch (e) {
            showToast(e.message, 'error');
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });

    document.getElementById('cancelEdit').addEventListener('click', clearForm);

    // Upload Logic
    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const fileInput = document.getElementById('excelFile');
        if (!fileInput.files.length) {
            showToast('请先选择文件', 'error');
            return;
        }

        const btn = document.getElementById('uploadBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 上传中...';
        btn.disabled = true;

        const form = new FormData();
        form.append('file', fileInput.files[0]);

        try {
            const res = await fetch(`${apiBase}/upload`, { method: 'POST', body: form });
            if (!res.ok) {
                const text = await res.text();
                throw new Error(text);
            }
            const data = await res.json();
            showToast(`成功导入 ${data.importedCount} 条数据`);
            loadData();
            loadStats();
            fileInput.value = '';
        } catch (e) {
            showToast(`导入失败: ${e.message}`, 'error');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });

    // Initial Load
    loadData();
    loadStats();
</script>
</body>
</html>
